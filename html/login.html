<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login</title>

    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/forms.css" />
  </head>

  <body>
    <header>
      <div class="PageTop">
        <nav class="NavPageTop" aria-label="Navegação Principal">
          <div class="Buttons">
            <a href="index.html"><strong>HABIT</strong></a>
            <a href="PrimeiraPagina.html">Início</a>
            <a href="#">Páginas</a>
            <a href="PaginaDestaque.html">Destaques</a>
            <a href="assinar.html">Assinar</a>
            <a href="admin.html">Admin</a>
          </div>
          <form action="#" class="SearchBarContainer" role="search">
            <div class="SearchBarInner">
              <label for="buscaGeral" class="visually-hidden"
                >Buscar no site</label
              >
              <input type="text" id="buscaGeral" placeholder="Buscar..." />
            </div>
            <button type="submit" class="ButtonsHeader">Buscar</button>
            <a class="ButtonsHeader" href="login.html">Entrar</a>
          </form>
        </nav>
      </div>
    </header>

    <main class="MainCentralizado">
      <section class="LoginCard">
        <h2>Entrar</h2>
        <form action="#" method="POST" class="login-form">
          <div class="campo-grupo">
            <label for="emailUsuario" class="visually-hidden">E-mail</label>
            <input
              type="email"
              id="emailUsuario"
              placeholder="E-mail"
              required
            />
          </div>

          <div class="campo-grupo">
            <label for="senhaUsuario" class="visually-hidden">Senha</label>
            <input
              type="password"
              id="senhaUsuario"
              placeholder="Senha"
              required
            />
          </div>

          <div class="botoes-grupo botoes-alinhado-esquerda">
            <button type="submit" class="btn-primario">Entrar</button>
            <button type="button" class="btn-secundario">
              Entrar com Google
            </button>
          </div>

          <div class="LinksAuxiliares">
            <a href="#">Esqueci a senha</a> &bull;
            <a href="criar-conta.html">Criar conta</a>
          </div>
        </form>
      </section>
    </main>

    <footer>
      <div>
        <nav class="NavPageBottom" aria-label="Navegação Secundária">
          <div class="Buttons">
            <a class="ButtonsFooter" onclick="" role="button"
              ><b>Instagram</b></a
            >
            <a class="ButtonsFooter" onclick="" role="button"><b>Work</b></a>
            <a class="ButtonsFooter" onclick="" role="button"><b>Bags</b></a>
            <a class="ButtonsFooter" onclick="" role="button"><b>Lamp</b></a>
            <a class="ButtonsFooter" onclick="" role="button"><b>Books</b></a>
          </div>
        </nav>
        <p id="Signature">© 2025 Meu Site • Meu site</p>
      </div>
    </footer>
  </body>
</html>
